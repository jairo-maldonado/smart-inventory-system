<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen p-8 relative">
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm"></div>

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-5">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Smart Inventory System</h1>
                <p class="text-sm text-gray-400 mt-1">Panel de control de stock tecnológico en tiempo real</p>
            </div>
            <button onclick="loadProducts()" class="bg-blue-600 hover:bg-blue-500 text-white font-medium px-5 py-2.5 rounded-xl transition-all shadow-lg shadow-blue-900/30 cursor-pointer">
                Sincronizar API
            </button>
        </header>

        <section class="bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-10 shadow-xl">
            <h2 class="text-xl font-bold text-white mb-4 tracking-tight">Añadir Nuevo Producto</h2>
            <form id="product-form" onsubmit="createProduct(event)" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4 items-end">
                <div>
                    <label class="block text-xs text-gray-400 uppercase font-medium mb-1">Nombre</label>
                    <input type="text" id="form-name" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase font-medium mb-1">SKU</label>
                    <input type="text" id="form-sku" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase font-medium mb-1">Precio</label>
                    <input type="number" step="0.01" id="form-price" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 uppercase font-medium mb-1">Stock Inicial</label>
                    <input type="number" id="form-stock" required class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2 rounded-xl transition-all shadow-lg shadow-emerald-900/30 cursor-pointer text-sm h-[38px]">
                    Guardar Producto
                </button>
            </form>
        </section>

        <main>
            <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>
    </div>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8000/products";

        function showNotification(message, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            
            const bgClass = type === "success" ? "bg-emerald-900 border-emerald-700 text-emerald-200" : "bg-red-900 border-red-700 text-red-200";
            
            toast.className = `${bgClass} border p-4 rounded-xl shadow-2xl transition-all duration-300 transform translate-y-2 opacity-0 flex items-center justify-between text-sm font-medium`;
            toast.innerText = message;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove("translate-y-2", "opacity-0");
            }, 10);

            setTimeout(() => {
                toast.classList.add("opacity-0", "translate-y-2");
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function loadProducts() {
            try {
                const response = await fetch(API_BASE_URL);
                if (!response.ok) throw new Error("Error en el servidor");
                
                const result = await response.json();
                const grid = document.getElementById("products-grid");
                grid.innerHTML = "";

                if (result.status === "success") {
                    result.data.forEach(product => {
                        const card = document.createElement("div");
                        card.className = "bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-xl hover:border-gray-700 transition-all flex flex-col justify-between";
                        
                        const isLowStock = product.stock <= product.min_stock;
                        const stockBadge = isLowStock 
                            ? `<span class="bg-red-950 text-red-400 text-xs font-semibold px-2.5 py-1 rounded-full border border-red-800/50">Stock Crítico</span>`
                            : `<span class="bg-emerald-950 text-emerald-400 text-xs font-semibold px-2.5 py-1 rounded-full border border-emerald-800/50">Estable</span>`;

                        card.innerHTML = `
                            <div>
                                <div class="flex justify-between items-start gap-4 mb-4">
                                    <h3 class="text-xl font-bold text-white tracking-tight">${product.name}</h3>
                                    ${stockBadge}
                                </div>
                                <p class="text-gray-500 text-xs tracking-wider uppercase font-mono">SKU: <span class="text-gray-300">${product.sku}</span></p>
                            </div>
                            
                            <div class="flex justify-between items-center mt-8 pt-4 border-t border-gray-800/60 mb-5">
                                <div>
                                    <p class="text-xs text-gray-500 uppercase font-medium">Precio</p>
                                    <span class="text-2xl font-black text-blue-400">$${product.price}</span>
                                </div>
                                <div class="text-right">
                                    <p class="text-xs text-gray-500 uppercase font-medium">Disponibles</p>
                                    <span class="text-xl font-bold ${isLowStock ? 'text-red-400' : 'text-gray-200'}">${product.stock} u</span>
                                </div>
                            </div>

                            <button onclick="sellProduct(${product.id})" class="w-full bg-gray-800 hover:bg-gray-700 text-gray-200 hover:text-white font-medium py-2 rounded-xl transition-all border border-gray-700 cursor-pointer text-sm">
                                Simular Venta (-1 u)
                            </button>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (error) {
                showNotification("Error de conexión con el servidor. Inténtelo más tarde.", "error");
            }
        }

        async function createProduct(event) {
            event.preventDefault();
            const name = document.getElementById("form-name").value;
            const sku = document.getElementById("form-sku").value;
            const price = parseFloat(document.getElementById("form-price").value);
            const stock = parseInt(document.getElementById("form-stock").value);

            try {
                const response = await fetch(API_BASE_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, sku, price, stock, min_stock: 5 })
                });

                const result = await response.json();
                if (response.status === 201 || result.status === "success") {
                    document.getElementById("product-form").reset();
                    showNotification("¡Producto registrado exitosamente!");
                    loadProducts();
                } else {
                    throw new Error();
                }
            } catch (error) {
                showNotification("No se pudo crear el producto. Verifique los datos.", "error");
            }
        }

        async function sellProduct(productId) {
            try {
                const response = await fetch(`${API_BASE_URL}/${productId}/stock`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ quantity: -1 })
                });
                
                const result = await response.json();
                if (result.status === "success") {
                    showNotification("Venta registrada con éxito.");
                    loadProducts();
                } else {
                    throw new Error();
                }
            } catch (error) {
                showNotification("Error al procesar la venta en el servidor.", "error");
            }
        }

        document.addEventListener("DOMContentLoaded", loadProducts);
    </script>
</body>
</html>
